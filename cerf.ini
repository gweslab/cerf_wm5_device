; cerf.ini — WinCE 5.0 device configuration
;
; Lines starting with ; are comments.
; Boolean values: true/false, yes/no, 1/0
; All settings can also be set via CLI (--key=value). CLI takes priority.

; Emulated screen dimensions reported to ARM apps via GetSystemMetrics,
; GetDeviceCaps, and SystemParametersInfoW(SPI_GETWORKAREA).
; CLI: --screen-width=N --screen-height=N
screen_width=800
screen_height=480
dpi_x=96
dpi_y=96

; When true, GetSystemMetrics/GetDeviceCaps return the values above
; instead of the real desktop resolution. Set to false to use native resolution.
; CLI: --fake-screen-resolution=true/false
fake_screen_resolution=true

; Emulated WinCE OS version returned by GetVersionExW.
; CLI: --os-major=N --os-minor=N --os-build=N --os-build-date=STR
os_major=5
os_minor=0
os_build=1
os_build_date=Jan  1 2008

; Fake total physical RAM in bytes for GlobalMemoryStatus.
; 0 = report real host memory (default). Uncomment to fake:
; fake_total_phys=67108864
; CLI: --fake-total-phys=N

; Boot services whitelist — semicolon-separated DLL names to load from
; HKLM\Drivers\BuiltIn\* at startup.
boot_services=ndis.dll;afd.dll

; Init sequence blacklist — semicolon-separated EXE names to skip when
; processing HKLM\init boot entries. Case-insensitive.
; Useful for skipping services that hang or aren't needed.
init_blacklist=connmgr.exe;srvtrust.exe;EmulatorStub.exe;device.exe;gwes.exe;services.exe

; Boot screen timing (milliseconds).
; Fallback: closes splash if the shell never signals (e.g. standalone exe).
; Shell timeout: max wait for explorer's SYSTEM/ShellAPIReady before launching user exe.
; boot_screen_fallback_ms=10000
; shell_ready_timeout_ms=30000

; Per-subsystem implementation selection. REQUIRED — fatal if missing.
; Available: psl_dispatch: ce5_psl, ce6_psl
psl_dispatch=ce5_psl
shell_folders=wm5_psl
ras_thunk=ce5
gwe_api_sets=none
gwes_dialog=ce5
gwes_button=ce5
gwes_scrollbar=ce5
gwes_menu=ce5
gwes_static=ce5
gwes_edit=ce5
gwes_listbox=ce5
gwes_combobox=ce5

; Virtual network adapter (libslirp backend; NDIS miniport mock)
network_enabled=1
network_mac=02:CE:5F:00:00:01
network_mtu=1500

